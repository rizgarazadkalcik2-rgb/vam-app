<!--
META / OPEN GRAPH / CANONICAL — statik bundler sayfaları için
(public/static-pages/platform/index.html, .../experiences/index.html,
 .../about/index.html)

Bu üç sayfa Next.js'in metadata sistemini KULLANMIYOR çünkü JSX'i
tarayıcıda çalışma zamanında derleyen özel bir sistemle sunuluyorlar.
Bu yüzden meta etiketleri JSX/bundler template'inin İÇİNE değil,
doğrudan o index.html dosyasının <head> bölümüne, düz HTML olarak
eklenmesi gerekiyor.

Aşağıdaki bloğu, her üç index.html dosyasında </head> etiketinden
hemen önceye yapıştırın ve <!-- DOLDUR --> yazan yerleri sayfaya göre
güncelleyin (title/description/url/görsel farklı olmalı, aksi halde
üç sayfa da Google'da birbirinin aynı görünür).
-->
